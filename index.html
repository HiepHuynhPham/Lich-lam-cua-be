<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Làm Của Em Bé 🎀</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
  </head>
  <body>
    <div class="card" id="auth-card">
      <div id="login-form">
        <h2>Đăng Nhập 🎀</h2>
        <input type="text" id="login-user" placeholder="Tên đăng nhập" />
        <input type="password" id="login-pass" placeholder="Mật khẩu" />
        <button id="login-button">Vào xem lịch thôi!</button>
        <p class="switch-btn" id="toggle-register">
          Chưa có tài khoản? Đăng ký
        </p>
      </div>
      <div id="register-form" class="hidden">
        <h2>Đăng Ký 🌸</h2>
        <input type="text" id="reg-user" placeholder="Tên đăng nhập mới" />
        <input type="password" id="reg-pass" placeholder="Mật khẩu mới" />
        <button id="register-button">Tạo tài khoản</button>
        <p class="switch-btn" id="toggle-login">Quay lại Đăng nhập</p>
      </div>
    </div>

    <div id="main-app" class="hidden">
      <div class="card main-card">
        <div class="header-app">
          <h2 id="hello-user">Chào bé! ✨</h2>
          <div id="countdown-timer" class="countdown"></div>
        </div>

        <div class="settings-box">
          <div class="branch-selector">
            <div class="branch-card" data-branch="176">
              CN 176<br /><small>22h30</small>
            </div>
            <div class="branch-card" data-branch="503">
              CN 503<br /><small>22h00</small>
            </div>
            <div class="branch-card" data-branch="220">
              CN 220<br /><small>22h30</small>
            </div>
            <div class="branch-card" data-branch="257">
              CN 257<br /><small>22h00</small>
            </div>
          </div>
          <input
            type="number"
            id="hourlyRateInput"
            value="35000"
          />
        </div>

        <div class="month-slider" id="monthSlider">
          <div class="month-display" id="monthDisplay"></div>
        </div>

        <div class="grid" id="calendarGrid"></div>

        <div class="stats">
          <div class="stat-box">
            <span id="totalFull">0</span>
            <div class="label">Full</div>
          </div>
          <div class="stat-box">
            <span id="totalHalf">0</span>
            <div class="label">Nửa</div>
          </div>
          <div class="stat-box total-salary">
            <span id="totalMoney">0đ</span>
            <div id="salaryTitle" class="label">TỔNG LƯƠNG</div>
          </div>
        </div>

        <div class="action-btns">
          <button class="btn-report" id="copy-report-button">
            📋 Copy báo cáo gửi Anh
          </button>
          <button class="btn-logout" id="logout-button">Đăng xuất</button>
        </div>
      </div>
    </div>

    <div class="modal" id="modal">
      <div class="modal-content">
        <h3 id="modalDate">Ngày ...</h3>
        <div class="btn-group">
          <button
            class="btn-full"
            data-shift="Full"
          >
            💼 Ca Full
          </button>

          <button
            class="btn-half"
            data-shift="Sáng"
          >
            🌅 Ca Sáng
          </button>

          <button
            class="btn-half"
            data-shift="Chiều"
          >
            🌤 Ca Chiều
          </button>

          <button
            class="btn-half"
            data-shift="Tối"
          >
            🌙 Ca Tối
          </button>

          <button class="btn-period">
            Ngày Dâu 🩸
          </button>

          <button class="btn-delete">❌ Xóa ca</button>
        </div>

        <textarea
          id="dayNote"
          placeholder="Ghi chú (tip, ghi chú thêm...)"
          rows="2"
        ></textarea>

        <button
          id="save-button"
          style="
            background: var(--pink);
            color: white;
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
          "
        >
          XÁC NHẬN & LƯU ✨
        </button>

        <p
          class="close-text"
          id="cancel-button"
          style="margin-top: 15px; cursor: pointer; color: #999"
        >
          Hủy bỏ
        </p>
      </div>
    </div>

    <div class="footer-version">Version: 39</div>
    <script src="js/main.js" type="module"></script>
  </body>
</html>
